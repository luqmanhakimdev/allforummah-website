name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify API token secret
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is empty or missing"
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN is present"
          echo "Using account_id from wrangler.toml (explicit Account ID approach)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify build output
        run: ls -la dist && test -f dist/index.html

      # Account ID comes from wrangler.toml account_id=
      # CLOUDFLARE_ACCOUNT_ID is also set as a backup for Account-scoped tokens
      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Explicit Account ID (Approach 1) — required for Account-scoped tokens
          CLOUDFLARE_ACCOUNT_ID: 3f9e5456f446737d1fcd0178ddd6257c
