<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AFU CMS Admin</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      :root {
        --bg: #0b0b0b;
        --panel: #141414;
        --text: #fff;
        --muted: rgba(255, 255, 255, 0.65);
        --purple: #9b5de5;
        --line: rgba(255, 255, 255, 0.1);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid var(--line);
      }
      header h1 {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      header a { color: var(--muted); text-decoration: none; }
      header a:hover { color: var(--text); }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 1.5rem;
        display: grid;
        gap: 1.5rem;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        padding: 1.25rem;
      }
      .panel h2 {
        margin: 0 0 1rem;
        font-size: 0.85rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--purple);
      }
      label {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.9rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      input, textarea {
        width: 100%;
        background: #0b0b0b;
        color: var(--text);
        border: 1px solid var(--line);
        padding: 0.7rem 0.8rem;
        font: inherit;
      }
      textarea { min-height: 140px; resize: vertical; }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.9rem;
      }
      .checks {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 0.5rem 0 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .checks input { width: auto; }
      .actions { display: flex; flex-wrap: wrap; gap: 0.6rem; }
      button, .btn {
        appearance: none;
        border: 1px solid var(--text);
        background: var(--text);
        color: #0b0b0b;
        padding: 0.7rem 1rem;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary, .btn.secondary {
        background: transparent;
        color: var(--text);
      }
      button.danger {
        background: transparent;
        border-color: #ff6b6b;
        color: #ff6b6b;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status {
        min-height: 1.25rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .status.error { color: #ff8f8f; }
      .status.ok { color: #8dffb0; }
      .auth-box { display: grid; gap: 0.75rem; max-width: 420px; }
      .list { display: grid; gap: 0.75rem; }
      .item {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        align-items: start;
        padding: 0.9rem 0;
        border-bottom: 1px solid var(--line);
      }
      .item:last-child { border-bottom: 0; padding-bottom: 0; }
      .item h3 { margin: 0 0 0.25rem; font-size: 1rem; }
      .meta { color: var(--muted); font-size: 0.8rem; }
      .badge {
        display: inline-block;
        margin-left: 0.4rem;
        padding: 0.1rem 0.4rem;
        border: 1px solid var(--line);
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .badge.on { border-color: var(--purple); color: var(--purple); }
      @media (max-width: 700px) {
        .row { grid-template-columns: 1fr; }
        .item { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>AFU CMS</h1>
      <a href="/">← Website</a>
    </header>

    <main>
      <section class="panel" id="auth-panel">
        <h2>Admin token</h2>
        <div class="auth-box">
          <label>
            CMS_ADMIN_TOKEN
            <input id="token" type="password" autocomplete="off" placeholder="Paste bearer token" />
          </label>
          <div class="actions">
            <button type="button" id="save-token">Save &amp; load posts</button>
            <button type="button" class="secondary" id="clear-token">Clear</button>
          </div>
          <p class="status" id="auth-status">
            Protect this page with Cloudflare Access. API writes require the admin token.
          </p>
        </div>
      </section>

      <section class="panel" id="editor-panel" hidden>
        <h2 id="editor-heading">New post</h2>
        <form id="post-form">
          <input type="hidden" id="post-id" />
          <label>
            Title
            <input id="title" required />
          </label>
          <div class="row">
            <label>
              Slug
              <input id="slug" placeholder="auto-from-title" />
            </label>
            <label>
              Date
              <input id="date" type="date" required />
            </label>
          </div>
          <label>
            Excerpt
            <input id="excerpt" />
          </label>
          <label>
            Body
            <textarea id="body" placeholder="Plain text or Markdown"></textarea>
          </label>
          <label>
            Cover image URL
            <input id="cover_url" placeholder="https://… or upload below" />
          </label>
          <label>
            Upload cover
            <input id="cover_file" type="file" accept="image/*" />
          </label>
          <label class="checks">
            <input id="published" type="checkbox" />
            Published
          </label>
          <div class="actions">
            <button type="submit" id="save-post">Save post</button>
            <button type="button" class="secondary" id="reset-form">New post</button>
          </div>
          <p class="status" id="form-status"></p>
        </form>
      </section>

      <section class="panel" id="list-panel" hidden>
        <h2>Posts</h2>
        <div class="list" id="posts"></div>
        <p class="status" id="list-status"></p>
      </section>
    </main>

    <script>
      const TOKEN_KEY = 'afu_cms_token';

      const els = {
        token: document.getElementById('token'),
        authStatus: document.getElementById('auth-status'),
        editorPanel: document.getElementById('editor-panel'),
        listPanel: document.getElementById('list-panel'),
        form: document.getElementById('post-form'),
        formStatus: document.getElementById('form-status'),
        listStatus: document.getElementById('list-status'),
        posts: document.getElementById('posts'),
        editorHeading: document.getElementById('editor-heading'),
        postId: document.getElementById('post-id'),
        title: document.getElementById('title'),
        slug: document.getElementById('slug'),
        date: document.getElementById('date'),
        excerpt: document.getElementById('excerpt'),
        body: document.getElementById('body'),
        coverUrl: document.getElementById('cover_url'),
        coverFile: document.getElementById('cover_file'),
        published: document.getElementById('published'),
      };

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || '';
      }

      function setToken(value) {
        if (value) localStorage.setItem(TOKEN_KEY, value);
        else localStorage.removeItem(TOKEN_KEY);
      }

      function authHeaders(json = true) {
        const headers = { Authorization: `Bearer ${getToken()}` };
        if (json) headers['Content-Type'] = 'application/json';
        return headers;
      }

      function setStatus(el, message, type = '') {
        el.textContent = message || '';
        el.className = `status${type ? ` ${type}` : ''}`;
      }

      function today() {
        return new Date().toISOString().slice(0, 10);
      }

      function resetForm() {
        els.postId.value = '';
        els.title.value = '';
        els.slug.value = '';
        els.date.value = today();
        els.excerpt.value = '';
        els.body.value = '';
        els.coverUrl.value = '';
        els.coverFile.value = '';
        els.published.checked = true;
        els.editorHeading.textContent = 'New post';
        setStatus(els.formStatus, '');
      }

      async function api(path, options = {}) {
        const res = await fetch(path, options);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || `Request failed (${res.status})`);
        return data;
      }

      async function loadPosts() {
        setStatus(els.listStatus, 'Loading…');
        try {
          const data = await api('/api/posts?all=1', { headers: authHeaders(false) });
          renderPosts(data.posts || []);
          setStatus(els.listStatus, `${data.posts.length} post(s)`);
        } catch (err) {
          renderPosts([]);
          setStatus(els.listStatus, err.message, 'error');
        }
      }

      function renderPosts(posts) {
        if (!posts.length) {
          els.posts.innerHTML = '<p class="meta">No posts yet.</p>';
          return;
        }

        els.posts.innerHTML = posts
          .map(
            (post) => `
          <article class="item" data-id="${post.id}">
            <div>
              <h3>
                ${escapeHtml(post.title)}
                <span class="badge ${post.published ? 'on' : ''}">${post.published ? 'Live' : 'Draft'}</span>
              </h3>
              <div class="meta">${escapeHtml(post.date)} · /${escapeHtml(post.slug)}</div>
            </div>
            <div class="actions">
              <button type="button" class="secondary" data-edit="${post.id}">Edit</button>
              <button type="button" class="danger" data-delete="${post.id}">Delete</button>
            </div>
          </article>`,
          )
          .join('');
      }

      function escapeHtml(value) {
        return String(value || '')
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;');
      }

      function unlock() {
        els.editorPanel.hidden = false;
        els.listPanel.hidden = false;
        if (!els.date.value) els.date.value = today();
      }

      document.getElementById('save-token').addEventListener('click', async () => {
        const token = els.token.value.trim();
        if (!token) {
          setStatus(els.authStatus, 'Token required', 'error');
          return;
        }
        setToken(token);
        setStatus(els.authStatus, 'Token saved', 'ok');
        unlock();
        await loadPosts();
      });

      document.getElementById('clear-token').addEventListener('click', () => {
        setToken('');
        els.token.value = '';
        els.editorPanel.hidden = true;
        els.listPanel.hidden = true;
        setStatus(els.authStatus, 'Token cleared');
      });

      document.getElementById('reset-form').addEventListener('click', resetForm);

      els.coverFile.addEventListener('change', async () => {
        const file = els.coverFile.files?.[0];
        if (!file) return;
        setStatus(els.formStatus, 'Uploading image…');
        try {
          const form = new FormData();
          form.append('file', file);
          const data = await api('/api/upload', {
            method: 'POST',
            headers: { Authorization: `Bearer ${getToken()}` },
            body: form,
          });
          els.coverUrl.value = data.url;
          setStatus(els.formStatus, 'Image uploaded', 'ok');
        } catch (err) {
          setStatus(els.formStatus, err.message, 'error');
        }
      });

      els.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const payload = {
          title: els.title.value.trim(),
          slug: els.slug.value.trim() || undefined,
          date: els.date.value,
          excerpt: els.excerpt.value.trim(),
          body: els.body.value,
          cover_url: els.coverUrl.value.trim(),
          published: els.published.checked,
        };

        setStatus(els.formStatus, 'Saving…');
        try {
          const id = els.postId.value;
          if (id) {
            await api(`/api/posts/${id}`, {
              method: 'PUT',
              headers: authHeaders(),
              body: JSON.stringify(payload),
            });
            setStatus(els.formStatus, 'Post updated', 'ok');
          } else {
            await api('/api/posts', {
              method: 'POST',
              headers: authHeaders(),
              body: JSON.stringify(payload),
            });
            setStatus(els.formStatus, 'Post created', 'ok');
          }
          resetForm();
          await loadPosts();
        } catch (err) {
          setStatus(els.formStatus, err.message, 'error');
        }
      });

      els.posts.addEventListener('click', async (event) => {
        const editId = event.target.getAttribute('data-edit');
        const deleteId = event.target.getAttribute('data-delete');

        if (editId) {
          try {
            const data = await api(`/api/posts/${editId}`, { headers: authHeaders(false) });
            const post = data.post;
            els.postId.value = post.id;
            els.title.value = post.title;
            els.slug.value = post.slug;
            els.date.value = post.date;
            els.excerpt.value = post.excerpt || '';
            els.body.value = post.body || '';
            els.coverUrl.value = post.cover_url || '';
            els.published.checked = Boolean(post.published);
            els.editorHeading.textContent = 'Edit post';
            setStatus(els.formStatus, `Editing “${post.title}”`);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } catch (err) {
            setStatus(els.listStatus, err.message, 'error');
          }
        }

        if (deleteId) {
          if (!confirm('Delete this post?')) return;
          try {
            await api(`/api/posts/${deleteId}`, {
              method: 'DELETE',
              headers: authHeaders(false),
            });
            await loadPosts();
          } catch (err) {
            setStatus(els.listStatus, err.message, 'error');
          }
        }
      });

      // Restore session
      const existing = getToken();
      if (existing) {
        els.token.value = existing;
        setStatus(els.authStatus, 'Token restored from this browser', 'ok');
        unlock();
        loadPosts();
      } else {
        els.date.value = today();
      }
    </script>
  </body>
</html>
